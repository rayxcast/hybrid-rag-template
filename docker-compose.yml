services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      # - "6334:6334"  # dashboard - uncomment only if needed
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.1 200' <&3 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    # networks: [rag-net]

  redis:
    image: redis/redis-stack:latest
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
    restart: unless-stopped
    # networks: [rag-net]

  reranker_service:
    build: ./services/reranker_service
    container_name: reranker
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8001 && echo -e 'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.1 200' <&3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # networks: [rag-net]

  app:
    build: .
    container_name: rag-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      reranker_service:
        condition: service_healthy
    volumes:
      - .:/app  # for hot-reload in dev; comment in prod
    command: ["uv", "run", "--with-editable", ".", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]  # no --reload by default
    restart: unless-stopped
    # networks: [rag-net]

  eval:
    build: .
    container_name: rag-eval
    profiles: ["dev", "eval"]  # only run with docker compose --profile eval up
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      reranker_service:
        condition: service_healthy
    volumes:
      - .:/app
      - ./eval_results:/app/eval_results
    command: ["uv", "run", "--with-editable", ".", "python", "-m", "app.evaluation.run_eval"]
    restart: no   # if it's a one-shot eval job

volumes:
  qdrant_data:
  redis_data:

# Add networks to improve isolation/security
# Create a shared network so services communicate internally without exposing all ports publicly.
# networks:
#   rag-net:
#     driver: bridge